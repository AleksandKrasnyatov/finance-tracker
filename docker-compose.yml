services:

  nginx:
    build:
      context: docker/nginx
    ports:
      - "80:80"
    volumes:
      - ./:/app
    depends_on:
      - app

  app:
    build:
      context: docker/php-fpm
    volumes:
      - ./:/app
    env_file:
      - .env

  php-cli:
    build:
      context: docker/php-cli
    volumes:
      - ./:/app
    env_file:
      - .env

  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres:/var/lib/postgresql
      - ./:/app
    ports:
      - "5432:5432"

volumes:
  postgres:
